# =========================
# Bluetooth Stability Fixes
# =========================

# Disable aggressive power management (most important fix for Mac disconnects)
CONFIG_PM=n

# Enable normal ZMK sleep with a longer idle timeout (15 minutes)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=900000

# Increase Bluetooth transmit power for stronger signal
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Optimize Bluetooth connection parameters for Apple devices
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=24
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Battery service reporting
CONFIG_BT_BAS=y

# Allow multiple saved Bluetooth profiles
CONFIG_BT_MAX_CONN=5

# Disable automatic security requests (can improve compatibility)
CONFIG_BT_GATT_AUTO_SEC_REQ=n

# Set the tracking sensitivity (CPI/DPI)
CONFIG_ZMK_POINTING_SMOOTH_SCROLL_DEFAULT_CPI_X=800
CONFIG_ZMK_POINTING_SMOOTH_SCROLL_DEFAULT_CPI_Y=800
